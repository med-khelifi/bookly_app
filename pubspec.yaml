name: bookly
description: A new Flutter project.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_svg: ^2.2.4
  google_fonts: ^8.1.0
  go_router: ^17.2.2
  equatable: ^2.0.8
  dartz: ^0.10.1
  dio: ^5.9.2
  flutter_bloc: ^9.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/

# Flutter Assets Gen (extension)
flutter_assets:
  assets_path: assets/images/
  output_path: lib/core/constants/
  filename: app_assets.dart
  field_prefix:
  classname: AppAssets
  ignore_comments: true